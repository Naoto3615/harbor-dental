<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harbor Dental | Plans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="extra-page">
    <div class="bg-layer"></div>
    <header class="site-header container">
      <a class="brand" href="index.html">Harbor Dental</a>
      <button class="menu-toggle" aria-expanded="false" aria-label="メニュー">☰</button>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="plans.html">Plans</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </header>

    <main class="container">
      <section class="subhero reveal">
        <span class="eyebrow">PLANS</span>
        <h1>診療目的別の通院プラン</h1>
        <p>予防中心の通院から治療集中まで、目的に合わせた診療設計が可能です。</p>
      </section>

      <section class="section reveal" data-pricing>
        <div class="pricing-head">
          <h2>プラン一覧</h2>
          <div class="pricing-mode">
            <button class="mode-btn active" type="button" data-mode="monthly">Monthly</button>
            <button class="mode-btn" type="button" data-mode="yearly">Yearly</button>
          </div>
        </div>

        <div class="pricing-cards">
          <article class="price-card">
            <h3>Preventive Care</h3>
            <p>定期検診・クリーニング中心の予防プラン。</p>
            <strong>¥<span data-price data-monthly="6000" data-yearly="66000">6000</span></strong>
          </article>
          <article class="price-card">
            <h3>Treatment Care</h3>
            <p>虫歯・歯周病治療を計画的に実施。</p>
            <strong>¥<span data-price data-monthly="12000" data-yearly="132000">12000</span></strong>
          </article>
          <article class="price-card">
            <h3>Aesthetic Care</h3>
            <p>審美治療とメンテナンスの組み合わせ。</p>
            <strong>¥<span data-price data-monthly="18000" data-yearly="198000">18000</span></strong>
          </article>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-head">
          <span class="eyebrow">ESTIMATE</span>
          <h2>簡易見積もり</h2>
        </div>
        <div class="calc-box">
          <form class="calc-form">
            <label>
              プラン単価(円)
              <select name="unit_price">
                <option value="6000">Preventive Care</option>
                <option value="12000">Treatment Care</option>
                <option value="18000">Aesthetic Care</option>
              </select>
            </label>
            <label>
              数量
              <input type="number" name="quantity" min="1" value="1" />
            </label>
            <label>
              期間(月)
              <input type="number" name="months" min="1" value="3" />
            </label>
            <button type="submit" class="btn primary">見積もる</button>
          </form>
          <p class="calc-result" aria-live="polite">見積もり結果: -</p>
        </div>
      </section>
    </main>

    <footer class="container">© <span id="year"></span> Harbor Dental</footer>
    <div class="toast" id="toast">更新内容を反映しました。</div>
    <script src="app.js"></script>
  </body>
</html>
